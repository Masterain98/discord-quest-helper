# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "monthly"
    # Limit open PRs to reduce noise
    open-pull-requests-limit: 5
    # Only track patch updates, grouped into a single PR
    allow:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
    groups:
      patch-only:
        update-types:
          - "patch"
    # Keep the dependency surface stable by ignoring minor and major version bumps
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"

  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    target-branch: "develop"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    allow:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
    groups:
      patch-only:
        update-types:
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
