# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "monthly"
    # Limit open PRs to reduce noise
    open-pull-requests-limit: 5
    # Group all minor updates into a single PR
    groups:
      minor-only:
        update-types:
          - "minor"
    # Only track minor updates; ignore patch bumps and major version changes
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-major"

  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    target-branch: "develop"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      minor-only:
        update-types:
          - "minor"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-major"
