# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "monthly"
    # Limit open PRs to reduce noise
    open-pull-requests-limit: 5
    # Group all non-major updates into a single PR
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    # Only track minor+ updates; ignore patch-only bumps for non-critical deps
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-major"

  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    target-branch: "develop"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-major"
